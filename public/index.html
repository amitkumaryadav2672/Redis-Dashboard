<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redis Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 { margin-top: 0; font-size: 1.5rem; color: #e2e8f0; }
        p { color: #94a3b8; font-size: 0.9rem; line-height: 1.6; }

        button {
            width: 100%;
            padding: 0.8rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 1rem;
        }

        .response-box {
            background: #020617;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            font-family: monospace;
            font-size: 0.8rem;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.05);
            max-height: 200px;
        }

        .status-tag { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 0.5rem; }
        .success { background: #059669; }
        .info { background: #2563eb; }

        input {
            width: calc(100% - 1.8rem);
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.5);
            color: white;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Redis Dashboard</h1>
        </header>

        <div class="grid">
            <div class="card">
                <h2>⚡ API Caching</h2>
                <p>Click and check the "Source" to see Redis in action.</p>
                <button onclick="fetchProducts()">Fetch Products</button>
                <div id="cache-res" class="response-box">Waiting...</div>
            </div>

            <div class="card">
                <h2>🔐 OTP Storage</h2>
                <p>Stores OTP in Redis for 60 seconds.</p>
                <input type="text" id="phone" value="9876543210">
                <button onclick="sendOTP()">Generate OTP</button>
                <div id="otp-res" class="response-box">Waiting...</div>
            </div>

            <div class="card">
                <h2>👤 Session Storage</h2>
                <p>Stores JWT session in Redis memory.</p>
                <input type="text" id="email" value="amit@gmail.com">
                <button onclick="login()">Login User</button>
                <div id="login-res" class="response-box">Waiting...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchProducts() {
            const resBox = document.getElementById('cache-res');
            resBox.innerHTML = "Fetching...";
            try {
                const response = await fetch('/products'); // Simple URL!
                const data = await response.json();
                resBox.innerHTML = `
                    <span class="status-tag ${data.source === 'Redis Cache' ? 'success' : 'info'}">${data.source}</span><br>
                    Data: ${JSON.stringify(data.data[0])}...
                `;
            } catch (err) { resBox.innerHTML = "Error: " + err.message; }
        }

        async function sendOTP() {
            const resBox = document.getElementById('otp-res');
            const phone = document.getElementById('phone').value;
            try {
                const response = await fetch('/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const data = await response.json();
                resBox.innerHTML = `OTP: <b>${data.otp}</b> (Stored in Redis)`;
            } catch (err) { resBox.innerHTML = "Error: " + err.message; }
        }

        async function login() {
            const resBox = document.getElementById('login-res');
            const email = document.getElementById('email').value;
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                resBox.innerHTML = `Token: ${data.token.substring(0, 30)}...`;
            } catch (err) { resBox.innerHTML = "Error: " + err.message; }
        }
    </script>
</body>
</html>
